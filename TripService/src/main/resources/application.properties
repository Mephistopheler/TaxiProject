spring.application.name=TripService
server.port=8082


spring.data.mongodb.uri=mongodb://admin:12345678@localhost:27017/trips?authSource=admin

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

driver.grpc.address=localhost:9091

spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s


app.kafka.trip-status-topic=trip.status.changed


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000


spring.kafka.properties.cluster.id=kraft-cluster
spring.kafka.properties.process.roles=broker
spring.kafka.properties.listeners=PLAINTEXT://localhost:9092
spring.kafka.properties.listener.security.protocol=PLAINTEXT
spring.kafka.properties.log.dirs=/tmp/kafka-logs
spring.kafka.properties.num.partitions=1
spring.kafka.properties.default.replication.factor=1
